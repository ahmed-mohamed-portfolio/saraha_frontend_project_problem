<section class=" mt-20 flex justify-center dark:bg-gray-500 sm:mt-20 md:py-10 items-center">

    <form class="w-[85%] max-w-80 py-5 p-2 md:w-[60%] lg:w-[80%] lg:max-w-96 xl:max-w-sm" [formGroup]="loginForm"
        (ngSubmit)="loginSubmit()">


        @if(errorMsg().length>0){
        <div class="p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50 dark:bg-gray-800 dark:text-red-400" role="alert">
            <span class="font-medium">Error:</span> {{errorMsg()}}
        </div>
        }


        <!-- email input -->
        <app-input [control]="loginForm.get('email')" [typeInput]="'email'" [idInput]="'email'"
            [placeHolder]="'ahmed.mohamed@gmail.com'" [labelInput]="'Email address'"></app-input>

        <!-- password input -->
        <app-input [control]="loginForm.get('password')" [idInput]="'password'" [placeHolder]="'•••••••••'"
            [labelInput]="'Password'">
            assword must be at least 8 characters, include uppercase, lowercase, number, and special
            character.
        </app-input>



        <button type="submit"
            class=" w-full cursor-pointer text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-lg  px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
            Log in
        </button>

        <p>or</p>

        <!-- sign in with google -->
        <div id="google-btn" class="hidden"></div>

        <button type="button" (click)="loginWithGoogle()"
            class="cursor-pointer text-white bg-[#4285F4] hover:bg-[#4285F4]/90 focus:ring-4 focus:outline-none focus:ring-[#4285F4]/50 box-border border border-transparent font-medium leading-5 rounded-base text-sm px-3 py-2.5 text-center inline-flex items-center dark:focus:ring-[#4285F4]/55">
            <svg class="w-4 h-4 me-1.5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                fill="currentColor" viewBox="0 0 24 24">
                <path fill-rule="evenodd"
                    d="M12.037 21.998a10.313 10.313 0 0 1-7.168-3.049 9.888 9.888 0 0 1-2.868-7.118 9.947 9.947 0 0 1 3.064-6.949A10.37 10.37 0 0 1 12.212 2h.176a9.935 9.935 0 0 1 6.614 2.564L16.457 6.88a6.187 6.187 0 0 0-4.131-1.566 6.9 6.9 0 0 0-4.794 1.913 6.618 6.618 0 0 0-2.045 4.657 6.608 6.608 0 0 0 1.882 4.723 6.891 6.891 0 0 0 4.725 2.07h.143c1.41.072 2.8-.354 3.917-1.2a5.77 5.77 0 0 0 2.172-3.41l.043-.117H12.22v-3.41h9.678c.075.617.109 1.238.1 1.859-.099 5.741-4.017 9.6-9.746 9.6l-.215-.002Z"
                    clip-rule="evenodd" />
            </svg>
            Sign in with Google
        </button>


        <!-- <a routerLink="/forget" class="block mt-2 text-blue-800 cursor-pointer">Forgotten password?</a> -->

        <hr class="h-px my-8 bg-gray-200 border-0 dark:bg-gray-700" />


        <button routerLink="/register" type="button"
            class="focus:outline-none text-white bg-green-700 hover:bg-green-800 focus:ring-4 focus:ring-green-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2 dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800 cursor-pointer">
            create New Account
        </button>






    </form>

    <img class="hidden sm:w-[50%] sm:block md:w-[40%] lg:w-[30%] xl:w-[25%]" src="/login.png" alt="" />
</section>
