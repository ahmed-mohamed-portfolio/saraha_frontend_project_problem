<app-navbar [isLogin]="false"></app-navbar>

<div
    class="my-24 mx-auto relative bg-neutral-primary-soft max-w-xs w-full p-6 border border-default rounded-base shadow-xs">

    <div class="flex flex-col items-center">
        <img class="w-24 h-24 mb-6 rounded-full" src="/user.png" alt="Bonnie image" />


        <h1 class="mb-0.5 text-xl font-semibold tracking-tight text-heading">{{userDetails?.data?.firstName}}
            {{userDetails?.data?.lastName}}</h1>


        <div class="flex flex-col mt-1">
            <div class="flex mt-0.5 ms">
                <i class="fa-solid fa-envelope me-1"></i>
                <span class="text-sm text-body ">{{userDetails?.data?.email}}</span>
            </div>

            <div class="flex mt-0.5">
                <i class="fa-solid fa-phone me-1"></i>
                <span class="text-sm text-body">{{userDetails?.data?.phone}}</span>
            </div>


            <div class="flex mt-0.5">
                <i class="fa-solid fa-cake-candles me-1"></i>
                <span class="text-sm text-body">{{userDetails?.data?.dateOfBirth}}</span>
            </div>


        </div>


        <app-create-message></app-create-message>


    </div>
</div>
